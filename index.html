<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=git, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="dist/index.css">
    <title>Auto</title>
</head>

<body>
    <header class="header">
        <div class="container">
            <div class="header__inner">
                <a class="header__inner-logo logo">
                    <img src="assets/logo.svg" alt="logo">
                </a>
                <div class="header__inner-content">
                    <nav class="header__inner-content-nav nav">
                        <ul class="nav__list">
                            <li class="nav__list-item">
                                <a href="#" class="nav__list-item-link">Home</a>
                            </li>
                            <li class="nav__list-item">
                                <a href="#" class="nav__list-item-link">About us</a>
                            </li>
                            <li class="nav__list-item">
                                <a href="#" class="nav__list-item-link">Services</a>
                            </li>
                            <li class="nav__list-item">
                                <a href="#" class="nav__list-item-link">Blog</a>
                            </li>
                            <li class="nav__list-item">
                                <a href="#" class="nav__list-item-link">Contact</a>
                            </li>
                        </ul>
                    </nav>
                    <div class="header__inner-content-contact contact">
                        <div class="contact__number">
                            <span>Road Assistance</span>
                            <a href="tel:18002652452">1800 265 24 52</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <main class="main">
        <section class="hero">
            <div class="container">
                <div class="hero__inner">
                    <div class="hero__content">
                        <h1 class="hero__content-title">Get your vehicle service done online at one place</h1>
                        <div class="hero__content-buttons">
                            <div class="hero__content-buttons-btnbook btn1">Book a service</div>
                            <div class="hero__content-buttons-playvideo btn2">Play Video</div>
                        </div>
                        <div class="hero__content-worktime">
                            <div class="hero__content-worktime-wrapper">
                                <span>We are open</span>
                                <time class="hero__content-worktime-time">Monday to Friday 9:00 AM to 10:00 AM</time>
                            </div>
                        </div>
                    </div>
                    <div class="hero__img">
                        <img src="assets/Image.jpg" alt="service image">
                        <span class="hero__info hero__info-left">Quick service</span>
                        <span class="hero__info hero__info-right"><span>4.5/5</span> Rating</span>
                    </div>

                </div>
            </div>
        </section>
    </main>
</body>

</html>
